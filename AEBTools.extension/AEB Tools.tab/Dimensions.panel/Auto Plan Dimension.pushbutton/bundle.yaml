title: Auto Dimension
tooltip: |
  Creates clean automatic plan dimensions for the active view:
  internal room width and length dimensions, external grid dimensions, and overall building size.
  Uses wall face references for rooms and overall dimensions, respects view rotation,
  view crop, and view scale, and runs in one safe transaction.
